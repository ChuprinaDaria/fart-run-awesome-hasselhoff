[general]
refresh_interval = 5
language = "ua"

[sounds]
enabled = true
quiet_hours_start = "23:00"
quiet_hours_end = "07:00"

[alerts]
cooldown_seconds = 300
desktop_notifications = true

[paths]
# Auto-detected by default. Override here:
# claude_dir = "~/.claude"
# docker_socket = "/var/run/docker.sock"
# scan_paths = ["~/projects"]

[plugins.docker_monitor]
enabled = true
cpu_threshold = 80
ram_threshold = 85
alert_on_exit = true

[plugins.port_map]
enabled = true

[plugins.security_scan]
enabled = true
scan_interval = 3600
scan_paths = ["~"]
