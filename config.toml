
[general]
refresh_interval = 5
language = "ua"

[sounds]
enabled = true
mode = "classic"
quiet_hours_start = "23:00"
quiet_hours_end = "07:00"

[alerts]
cooldown_seconds = 300
desktop_notifications = true

[plugins.docker_monitor]
enabled = true
cpu_threshold = 80
ram_threshold = 85
alert_on_exit = true

[plugins.port_map]
enabled = true

[plugins.security_scan]
enabled = true
scan_interval = 3600
scan_paths = ["~"]

[snapshots]
enabled = true
auto_interval_minutes = 30
max_snapshots = 50

[haiku]
api_key = ""
