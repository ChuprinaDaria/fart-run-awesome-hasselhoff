[general]
refresh_interval = 5
sound_enabled = true
sound_dir = ""

[alerts]
cooldown_seconds = 300
desktop_notifications = true
sound_enabled = true
quiet_hours_start = "23:00"
quiet_hours_end = "07:00"

[plugins.docker_monitor]
enabled = true
cpu_threshold = 80
ram_threshold = 85
alert_on_exit = true

[plugins.port_map]
enabled = true

[plugins.security_scan]
enabled = true
scan_interval = 3600
scan_paths = ["~"]
